apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: micro-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: orders }
  template:
    metadata:
      labels: { app: orders }
    spec:
      containers:
        - name: orders
          image: yourrepo/orders:latest
          ports:
            - containerPort: 4003
          env:
            - name: PORT
              value: "4003"
            - name: JWT_SECRET
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWT_SECRET
            - name: MONGO_URI
              value: mongodb://mongodb:27017/ordersdb
            - name: RABBITMQ_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: RABBITMQ_URL
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: micro-demo
spec:
  selector: { app: orders }
  ports:
    - port: 4003
      targetPort: 4003

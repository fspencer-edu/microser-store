apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: micro-demo
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: yourrepo/frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://gateway:8080
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: micro-demo
spec:
  selector: { app: frontend }
  ports:
    - port: 3000
      targetPort: 3000
